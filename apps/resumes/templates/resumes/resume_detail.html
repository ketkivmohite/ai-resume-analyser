<!DOCTYPE html>
<html>
<head>
    <title>{{ resume.title }}</title>
</head>
<body>

    <h1>{{ resume.title }}</h1>
    <p>{{ resume.description }}</p>
    <p>Uploaded at: {{ resume.uploaded_at }}</p>

    <hr>

    <h2>AI Resume Analysis</h2>

    <form method="POST">
        {% csrf_token %}
        <label>Paste Job Description (optional):</label>
        <br>
        <textarea 
            name="job_description" 
            rows="6" 
            cols="60"
            placeholder="Paste the job description here for a match score...">{{ job_description }}</textarea>
        <br><br>
        <button type="submit">Analyse My Resume</button>
    </form>

    {% if analysis %}
        <hr>
        <h2>Analysis Results</h2>
        <pre>{{ analysis }}</pre>
    {% endif %}

    <br>
    <a href="{% url 'resume_list' %}">Back to Resume List</a>

</body>
</html>
